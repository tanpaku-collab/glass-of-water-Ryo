<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="screen-orientation" content="landscape">
<title>カートレース</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; background: #111; overflow: hidden; touch-action: none; font-family: sans-serif; }
  canvas { display: block; position: fixed; top: 0; left: 0; }
  #ui { display: none; }

  /* 縦向き警告 */
  #rotate-msg {
    display: none;
    position: fixed; inset: 0;
    background: #000;
    color: #00ffff;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    text-align: center;
    z-index: 999;
    gap: 20px;
  }
  #rotate-msg .icon { font-size: 64px; }

  #touch-controls {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    pointer-events: none;
    z-index: 100;
  }
  .touch-btn {
    position: absolute;
    pointer-events: all;
    border-radius: 50%;
    background: rgba(0,255,255,0.15);
    border: 2.5px solid rgba(0,255,255,0.5);
    color: #00ffff;
    font-size: 22px;
    display: flex; align-items: center; justify-content: center;
    user-select: none; -webkit-user-select: none;
  }
  .touch-btn.pressed { background: rgba(0,255,255,0.45); }

  /* ボタン位置は画面サイズに応じてJSで設定 */
  #btn-fs-pc {
    position: fixed; top: 10px; right: 10px;
    z-index: 200;
    background: rgba(0,255,255,0.15);
    border: 2px solid rgba(0,255,255,0.5);
    color: #00ffff;
    font-size: 20px;
    width: 44px; height: 44px;
    border-radius: 8px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }
  #btn-fs-pc:hover { background: rgba(0,255,255,0.35); }

  @media (pointer: coarse) {
    #touch-controls { display: block; }
  }
  @media (pointer: coarse) and (orientation: portrait) {
    #rotate-msg { display: flex; }
    #touch-controls { display: none !important; }
    canvas { display: none; }
  }
</style>
</head>
<body>
<div id="btn-fs-pc" title="全画面">⛶</div>
<div id="rotate-msg">
  <div class="icon">📱</div>
  <div>スマホを横向きにしてください</div>
  <div style="font-size:16px;color:#aaa">Please rotate your device</div>
</div>
<canvas id="c" width="1400" height="900"></canvas>
<div id="ui">← → キーで動く　スペースでスタート</div>

<div id="touch-controls">
  <div class="touch-btn" id="btn-left">◀</div>
  <div class="touch-btn" id="btn-right">▶</div>
  <div class="touch-btn" id="btn-up">▲</div>
  <div class="touch-btn" id="btn-down">▼</div>
  <div class="touch-btn" id="btn-beam">⚡BEAM</div>
  <div class="touch-btn" id="btn-start">▶ START</div>
  <div class="touch-btn" id="btn-fs" style="position:fixed;top:10px;right:10px;width:44px;height:44px;font-size:18px;z-index:200;border-radius:8px;">⛶</div>
</div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

// canvasを画面全体にフィットさせる
function resizeCanvas() {
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;

  // タッチボタン配置
  const sw = window.innerWidth, sh = window.innerHeight;
  const bs = Math.min(sw, sh) * 0.13;
  const gap = bs * 0.25;

  function setBtn(id, left, bottom, w, h) {
    const el = document.getElementById(id);
    if (!el) return;
    el.style.width  = (w || bs) + 'px';
    el.style.height = (h || bs) + 'px';
    el.style.left   = left  !== null ? left  + 'px' : '';
    el.style.bottom = bottom !== null ? bottom + 'px' : '';
    el.style.right  = '';
  }

  setBtn('btn-left',  gap,           sh*0.12);
  setBtn('btn-right', gap + bs*2,    sh*0.12);
  setBtn('btn-up',    gap + bs,      sh*0.12 + bs + gap*0.5);
  setBtn('btn-down',  gap + bs,      sh*0.12 - bs - gap*0.5);

  const beamEl = document.getElementById('btn-beam');
  if (beamEl) {
    beamEl.style.width  = bs*1.1 + 'px';
    beamEl.style.height = bs*1.1 + 'px';
    beamEl.style.right  = gap + 'px';
    beamEl.style.left   = '';
    beamEl.style.bottom = sh*0.12 + 'px';
  }
  const startEl = document.getElementById('btn-start');
  if (startEl) {
    startEl.style.width  = bs*1.8 + 'px';
    startEl.style.height = bs*0.65 + 'px';
    startEl.style.right  = (gap + bs*1.2) + 'px';
    startEl.style.left   = '';
    startEl.style.bottom = gap + 'px';
  }
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);
window.addEventListener('orientationchange', () => setTimeout(resizeCanvas, 300));

// W(), H() を動的に参照
const W = () => canvas.width;
const H = () => canvas.height;
const HORIZON = () => Math.floor(canvas.height * 0.42);
const ROAD_SLICES = () => canvas.height - HORIZON();

const SEG_LEN = 200;
let segments = [];
let trackPos = 0;

function buildTrack() {
  segments = [];
  function addStraight(n) { for (let i = 0; i < n; i++) segments.push({ curve: 0 }); }
  function addCurve(n, c) { for (let i = 0; i < n; i++) segments.push({ curve: c }); }
  for (let rep = 0; rep < 20; rep++) {
    addStraight(8); addCurve(30, 1.4); addStraight(5); addCurve(25, -1.6);
    addStraight(6); addCurve(20, 1.8); addStraight(4); addCurve(28, -1.5);
    addStraight(5); addCurve(15, 1.2); addCurve(15, -1.3);
  }
}

function getSeg(idx) {
  return segments[((idx % segments.length) + segments.length) % segments.length];
}

let state = 'waitclick';
let score = 0;
let speed = 4;
let kartX = W() / 2;
let keys = {};
let obstacles = [];
let obTimer = 0;
let obInterval = 50;
let particles = [];
let exploding = false;
let explodeTimer = 0;
let gameTimer = 0;
let bossActive = false;
let bossX = W() / 2;
let bossY = HORIZON() + 20;
let bossHP = 5;
let bossAppeared = false;
let beams = [];
let beamCooldown = 0;
let level = 1;

let openingTimer = 0;
let openingCharIdx = 0;
let openingTextDone = false;
const OPENING_TEXT = '君たちがこれからの未来を救ってくれ';
const OPENING_CHAR_INTERVAL = 6;

const KART_W = 52;
const KART_H = 38;
let kartY = H() - 22;
const OB_TYPES_NORMAL = ['car', 'goat', 'boar', 'squirrel', 'human'];
const OB_TYPES_BOSS = ['rock'];

let speedLocked = false;
let playerHP = 5;
const PLAYER_MAX_HP = 5;
let items = []; // 回復アイテム

document.addEventListener('keydown', e => {
  keys[e.key] = true;
  ensureAudio();
  if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key)) e.preventDefault();
  if (e.key === ' ' && state === 'opening') {
    if (!openingTextDone) { openingCharIdx = OPENING_TEXT.length; openingTextDone = true; }
    else state = 'title';
  }
  if (e.key === ' ' && state !== 'play' && state !== 'exploding' && state !== 'opening') {
    stopBGM(); startGame(); startBGM();
  }
  if (e.key === ' ' && state === 'play') speedLocked = !speedLocked;
  if ((e.key === 'z' || e.key === 'Z') && state === 'play' && beamCooldown <= 0) {
    beams.push({ x: kartX, y: kartY - KART_H, vy: -12 });
    beamCooldown = 15;
  }
});
document.addEventListener('click', ensureAudio);
document.addEventListener('keyup', e => { keys[e.key] = false; });

function startGame() {
  state = 'play'; score = 0; speed = 4; kartX = W() / 2; kartY = H() - 22;
  obstacles = []; obTimer = 0; obInterval = 50; particles = [];
  exploding = false; explodeTimer = 0; trackPos = 0; gameTimer = 0;
  bossActive = false; bossAppeared = false; bossX = W() / 2; bossY = HORIZON() + 20;
  bossHP = 5; beams = []; beamCooldown = 0; level = 1;
  playerHP = PLAYER_MAX_HP; items = [];
  buildTrack();
}

buildTrack();

function drawRoad() {
  for (let y = 0; y < HORIZON(); y++) {
    const t = y / HORIZON();
    ctx.fillStyle = `rgb(${Math.floor(2+t*10)},${Math.floor(t*5)},${Math.floor(20+t*40)})`;
    ctx.fillRect(0, y, W(), 1);
  }
  for (let i = 0; i < 120; i++) {
    const sx = (i*137+31)%W(), sy = (i*97+13)%HORIZON();
    const ss = i%4===0?3:i%3===0?2:1;
    const blink = Math.sin(gameTimer*0.04+i*0.7)*0.4+0.6;
    ctx.globalAlpha = blink;
    ctx.fillStyle = ['#ffffff','#aaddff','#ffaaff','#aaffff'][i%4];
    ctx.fillRect(sx, sy, ss, ss);
  }
  ctx.globalAlpha = 1.0;
  ctx.globalAlpha = 0.5;
  ctx.fillStyle = '#3a1a6a';
  ctx.beginPath(); ctx.arc(W()*0.8, HORIZON()*0.3, 45, 0, Math.PI*2); ctx.fill();
  ctx.strokeStyle = '#8844cc'; ctx.lineWidth = 3;
  ctx.beginPath(); ctx.ellipse(W()*0.8, HORIZON()*0.3, 70, 15, -0.3, 0, Math.PI*2); ctx.stroke();
  ctx.globalAlpha = 1.0;

  const startSegIdx = Math.floor(trackPos / SEG_LEN);
  const startSegOff = trackPos % SEG_LEN;
  let cx = W()/2, prevCx = W()/2;
  const sliceCx = new Array(ROAD_SLICES());
  const lookahead = 18;
  for (let slice = 0; slice < ROAD_SLICES(); slice++) {
    const t = slice/ROAD_SLICES();
    const perspective = 0.15+t*0.85;
    const segStep = (SEG_LEN*perspective)/ROAD_SLICES()*12;
    const aheadF = lookahead*(1-t), aheadI = Math.floor(aheadF), aheadFrac = aheadF-aheadI;
    const segPos = startSegOff+slice*segStep;
    const segIdxA = startSegIdx+aheadI+Math.floor(segPos/SEG_LEN);
    const segIdxB = startSegIdx+aheadI+1+Math.floor(segPos/SEG_LEN);
    const curve = getSeg(segIdxA).curve+(getSeg(segIdxB).curve-getSeg(segIdxA).curve)*aheadFrac;
    const shift = curve*(1-t)*2.8;
    cx = slice===0?W()/2:(prevCx+shift);
    const halfW = 60+t*340;
    cx = cx*0.97+(W()/2)*0.03;
    cx = Math.max(halfW+4, Math.min(W()-halfW-4, cx));
    sliceCx[slice] = cx; prevCx = cx;
  }

  for (let slice = 0; slice < ROAD_SLICES(); slice++) {
    const screenY = HORIZON()+slice;
    const t = slice/ROAD_SLICES();
    cx = sliceCx[slice];
    const halfW = 60+t*340;
    const left = cx-halfW, right = cx+halfW;
    ctx.fillStyle = t>0.5?'#0a0015':'#050010';
    ctx.fillRect(0, screenY, W(), 1);
    const rg = Math.floor(30+t*20);
    ctx.fillStyle = `rgb(${rg},${rg},${Math.floor(rg*1.5)})`;
    ctx.fillRect(Math.floor(left), screenY, Math.ceil(right-left), 1);
    const perspective2 = 0.15+t*0.85;
    const segStep2 = (SEG_LEN*perspective2)/ROAD_SLICES()*12;
    const gridPos = Math.floor((trackPos+slice*segStep2)/30);
    if (gridPos%2===0) {
